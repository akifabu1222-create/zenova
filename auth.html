<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish - ZENOVA</title>
    <link rel="icon" type="image/png" href="img/preview.webp">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.html">
    <style>
        :root {
            --primary: #00ff41;
            --secondary: #ff00ff;
            --accent: #00d4ff;
            --dark: #0a0e27;
            --darker: #050814;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--darker);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(0, 255, 65, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.15) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes bgPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

        /* Animated Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .auth-container {
            position: relative;
            z-index: 10;
            background: rgba(15, 20, 40, 0.95);
            border: 2px solid var(--accent);
            padding: 50px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.3);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-section img {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.7));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-section h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3em;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .logo-section p {
            color: var(--accent);
            font-size: 1.2em;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .tab {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--accent);
            font-weight: 600;
            font-size: 1.1em;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 212, 255, 0.3);
            color: #fff;
            font-size: 1.1em;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.95em;
        }

        .remember-forgot label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #bbb;
        }

        .remember-forgot input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .remember-forgot a {
            color: var(--accent);
            text-decoration: none;
            transition: all 0.3s;
        }

        .remember-forgot a:hover {
            color: var(--primary);
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: var(--dark);
            font-size: 1.3em;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 25px rgba(0, 255, 65, 0.5);
        }

        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .divider span {
            background: rgba(15, 20, 40, 0.95);
            padding: 0 15px;
            color: #888;
            font-size: 0.95em;
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .social-btn:hover {
            border-color: var(--accent);
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        .social-btn img {
            width: 24px;
            height: 24px;
        }

        .back-home {
            text-align: center;
            margin-top: 25px;
        }

        .back-home a {
            color: var(--accent);
            text-decoration: none;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        .back-home a:hover {
            color: var(--primary);
        }

        .error-message {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff0000;
            padding: 12px;
            margin-bottom: 20px;
            color: #ff6666;
            display: none;
        }

        .success-message {
            background: rgba(0, 255, 65, 0.2);
            border: 2px solid var(--primary);
            padding: 12px;
            margin-bottom: 20px;
            color: var(--primary);
            display: none;
        }

        @media (max-width: 768px) {
            .auth-container {
                padding: 30px 20px;
            }
            .logo-section h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="auth-container">
        <div class="logo-section">
            <img src="img/preview.webp" alt="ZENOVA">
            <h1>ZENOVA</h1>
            <p>O'zbekistonning №1 Gaming Platformasi</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">KIRISH</button>
            <button class="tab" onclick="switchTab('register')">RO'YXATDAN O'TISH</button>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <!-- LOGIN FORM -->
        <div id="loginForm" class="form-section active">
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Email yoki Username</label>
                    <input type="text" id="loginUsername" required placeholder="username yoki email@example.com">
                </div>

                <div class="input-group">
                    <label>Parol</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox" id="rememberMe">
                        <span>Eslab qolish</span>
                    </label>
                    <a href="#" onclick="alert('Parolni tiklash xizmati tez orada!'); return false;">Parolni unutdingizmi?</a>
                </div>

                <button type="submit" class="btn-primary">KIRISH</button>
            </form>

            <div class="divider">
                <span>yoki</span>
            </div>

            <div class="social-login">
                <button class="social-btn" onclick="socialLogin('google')">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Google bilan kirish
                </button>

                <button class="social-btn" onclick="socialLogin('facebook')">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#fff" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    Facebook bilan kirish
                </button>

                <button class="social-btn" onclick="socialLogin('steam')">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#fff" d="M12 2a10 10 0 0 1 10 10 10 10 0 0 1-10 10A10 10 0 0 1 2 12 10 10 0 0 1 12 2m0-2a12 12 0 0 0-12 12 12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.5 8.5a3 3 0 0 1 3 3 3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3m0 1a2 2 0 0 0-2 2 2 2 0 0 0 2 2 2 2 0 0 0 2-2 2 2 0 0 0-2-2z"/></svg>
                    Steam bilan kirish
                </button>
            </div>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" class="form-section">
            <form onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" required placeholder="username" minlength="3">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required placeholder="email@example.com">
                </div>

                <div class="input-group">
                    <label>Parol</label>
                    <input type="password" id="regPassword" required placeholder="••••••••" minlength="6">
                </div>

                <div class="input-group">
                    <label>Parolni tasdiqlang</label>
                    <input type="password" id="regConfirmPassword" required placeholder="••••••••" minlength="6">
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox" required>
                        <span>Men <a href="#" style="color: var(--accent);">Shartlar</a>ni qabul qilaman</span>
                    </label>
                </div>

                <button type="submit" class="btn-primary">RO'YXATDAN O'TISH</button>
            </form>

            <div class="divider">
                <span>yoki</span>
            </div>

            <div class="social-login">
                <button class="social-btn" onclick="socialLogin('google')">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Google bilan ro'yxatdan o'tish
                </button>

                <button class="social-btn" onclick="socialLogin('facebook')">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#fff" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    Facebook bilan ro'yxatdan o'tish
                </button>

                <button class="social-btn" onclick="socialLogin('steam')">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#fff" d="M12 2a10 10 0 0 1 10 10 10 10 0 0 1-10 10A10 10 0 0 1 2 12 10 10 0 0 1 12 2m0-2a12 12 0 0 0-12 12 12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.5 8.5a3 3 0 0 1 3 3 3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3m0 1a2 2 0 0 0-2 2 2 2 0 0 0 2 2 2 2 0 0 0 2-2 2 2 0 0 0-2-2z"/></svg>
                    Steam bilan ro'yxatdan o'tish
                </button>
            </div>
        </div>

    <script>
        // Create stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // Switch tabs
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            const forms = document.querySelectorAll('.form-section');
            
            tabs.forEach(t => t.classList.remove('active'));
            forms.forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            
            hideMessages();
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }

        // Show success message
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => successDiv.style.display = 'none', 3000);
        }

        // Hide messages
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        // Handle Login
        function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const remember = document.getElementById('rememberMe').checked;
            
            // Demo - haqiqiy backendga ulanish kerak
            if (username && password) {
                const userData = {
                    username: username,
                    loginTime: new Date().toISOString(),
                    remember: remember
                };
                
                localStorage.setItem('zenovaUser', JSON.stringify(userData));
                localStorage.setItem('zenovaLoggedIn', 'true');
                
                showSuccess('Muvaffaqiyatli kirdingiz! Yo\'naltirilmoqda...');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                showError('Iltimos, barcha maydonlarni to\'ldiring!');
            }
        }

        // Handle Register
        function handleRegister(e) {
            e.preventDefault();
            
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            // Validation
            if (username.length < 3) {
                showError('Username kamida 3 ta belgidan iborat bo\'lishi kerak!');
                return;
            }
            
            if (password.length < 6) {
                showError('Parol kamida 6 ta belgidan iborat bo\'lishi kerak!');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Parollar mos kelmayapti!');
                return;
            }
            
            // Demo - haqiqiy backendga ulanish kerak
            const userData = {
                username: username,
                email: email,
                registerTime: new Date().toISOString(),
                score: 0
            };
            
            localStorage.setItem('zenovaUser', JSON.stringify(userData));
            localStorage.setItem('zenovaLoggedIn', 'true');
            
            showSuccess('Ro\'yxatdan o\'tdingiz! Yo\'naltirilmoqda...');
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }

        // Social Login
        function socialLogin(provider) {
            showSuccess(provider.charAt(0).toUpperCase() + provider.slice(1) + ' bilan kirish tez orada!');

        }
    </script>
</body>
</html>
